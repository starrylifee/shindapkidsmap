const GRADES = ["1학년","2학년","3학년","4학년","5학년","6학년"];
const GCOLOR = {"1학년":"#e6194b","2학년":"#3cb44b","3학년":"#4363d8","4학년":"#f58231","5학년":"#911eb4","6학년":"#008080"};
let map, geocoder, ps, markers=[], activeGrade="전체", kw="";

function saveKey(){
  const k=document.getElementById('keyin').value.trim();
  if(!k){alert('키를 입력하세요');return;}
  localStorage.setItem('kakaoKey',k); location.reload();
}
function loadSDK(key){
  const s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+key+'&libraries=services,clusterer&autoload=false';
  s.onload=function(){kakao.maps.load(init);};
  s.onerror=function(){document.getElementById('status').textContent='SDK 로드 실패 — 키/도메인 확인';};
  document.head.appendChild(s);
}
const KEY="9470a3877c2b2e0fcaf1c8520c8ae28a";
if(KEY){document.getElementById('setup').style.display='none'; loadSDK(KEY);}

function init(){
  map=new kakao.maps.Map(document.getElementById('map'),{
    center:new kakao.maps.LatLng(37.574,127.05), level:6});
  geocoder=new kakao.maps.services.Geocoder();
  ps=new kakao.maps.services.Places();
  buildFilters(); render();
  document.getElementById('q').addEventListener('input',function(e){kw=e.target.value.trim();render();});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'){ e.preventDefault(); selectIndex(Math.min(cursor+1, view.length-1)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); selectIndex(Math.max(cursor-1, 0)); }
    else if(e.key==='Escape'){ closeDetail(); }
  });
  geocodeAll();
}

function buildFilters(){
  const f=document.getElementById('filters');
  ["전체"].concat(GRADES).forEach(function(g){
    const c=document.createElement('div');
    c.className='chip'+(g==="전체"?' active':''); c.dataset.g=g; c.textContent=g;
    c.onclick=function(){activeGrade=g;
      document.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('active',x.dataset.g===g);});
      render();};
    f.appendChild(c);
  });
  document.getElementById('cnt').textContent=PLACES.length;
}
function visible(p){
  if(activeGrade!=="전체" && p.grade!==activeGrade) return false;
  if(kw && !((p.name+p.reason+p.address).includes(kw))) return false;
  return true;
}
let view=[], itemEls=[], cursor=-1;
function render(){
  const list=document.getElementById('list'); list.innerHTML='';
  view=PLACES.filter(visible); itemEls=[]; cursor=-1;
  view.forEach(function(p,idx){
    const d=document.createElement('div'); d.className='item';
    d.innerHTML='<div class="nm">'+esc(p.name)+'</div>'+
      '<div class="meta"><span class="badge" style="background:'+(GCOLOR[p.grade]||'#888')+'">'+p.grade+'</span></div>'+
      '<div class="rs">'+esc(p.reason||p.address||'')+'</div>';
    d.onclick=function(){selectIndex(idx);};
    list.appendChild(d); itemEls.push(d);
  });
  markers.forEach(function(m){ m.marker.setMap(visible(m.place)?map:null); });
}
function selectIndex(idx){
  if(idx<0||idx>=view.length) return;
  cursor=idx;
  itemEls.forEach(function(el,k){ el.classList.toggle('active',k===idx); });
  const el=itemEls[idx]; if(el) el.scrollIntoView({block:'nearest'});
  focusPlace(view[idx]);
}
function syncRow(p){
  const i=view.indexOf(p); cursor=i;
  itemEls.forEach(function(el,k){ el.classList.toggle('active',k===i); });
  if(i>=0 && itemEls[i]) itemEls[i].scrollIntoView({block:'nearest'});
}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

function geocodeAll(){
  let i=0, ok=0;
  const cache=JSON.parse(localStorage.getItem('geocache')||'{}');
  function next(){
    if(i>=PLACES.length){
      localStorage.setItem('geocache',JSON.stringify(cache));
      document.getElementById('status').textContent='표시 완료: '+ok+'곳 (전체 '+PLACES.length+')';
      setTimeout(function(){document.getElementById('status').style.display='none';},2500);
      return;
    }
    const p=PLACES[i++]; const ck=p.address||p.query;
    document.getElementById('status').textContent='위치 찾는 중... '+i+'/'+PLACES.length;
    if(cache[ck]){ place(p,cache[ck].lat,cache[ck].lng); ok++; return next(); }
    const useKw=function(cb){ ps.keywordSearch(p.query,function(r,st){
      if(st===kakao.maps.services.Status.OK&&r.length) cb(+r[0].y,+r[0].x); else cb(null);
    });};
    const done=function(lat,lng){ if(lat){cache[ck]={lat:lat,lng:lng}; place(p,lat,lng); ok++;} setTimeout(next,70); };
    if(p.address){
      geocoder.addressSearch(p.address,function(r,st){
        if(st===kakao.maps.services.Status.OK&&r.length) done(+r[0].y,+r[0].x);
        else useKw(done);
      });
    } else { useKw(done); }
  }
  next();
}
function place(p,lat,lng){
  const pos=new kakao.maps.LatLng(lat,lng);
  const marker=new kakao.maps.Marker({position:pos,map:visible(p)?map:null,
    image:pin(GCOLOR[p.grade]||'#888')});
  kakao.maps.event.addListener(marker,'click',function(){openDetail(p);});
  markers.push({marker:marker,place:p,pos:pos});
  p._pos=pos;
}
function pin(color,big){
  const pad = big?3:0;
  const vb = (-pad)+' '+(-pad)+' '+(26+pad*2)+' '+(34+pad*2);
  const stroke = big?' stroke="#ffffff" stroke-width="2.5"':'';
  const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+vb+'">'+
    '<path d="M13 0C6 0 0 5.5 0 13c0 9 13 21 13 21s13-12 13-21C26 5.5 20 0 13 0z" fill="'+color+'"'+stroke+'/>'+
    '<circle cx="13" cy="13" r="5" fill="#fff"/></svg>';
  const w = big?42:26;
  const h = w*(34+pad*2)/(26+pad*2);
  return new kakao.maps.MarkerImage('data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg))),
    new kakao.maps.Size(w,h),{offset:new kakao.maps.Point(w/2, h*(34+pad)/(34+pad*2))});
}
let selected=null;
function highlight(p){
  if(selected){ selected.marker.setImage(pin(GCOLOR[selected.place.grade]||'#888',false)); selected.marker.setZIndex(1); }
  const e=markers.find(function(m){return m.place===p;});
  if(e){ e.marker.setImage(pin(GCOLOR[p.grade]||'#888',true)); e.marker.setZIndex(100); selected=e; }
}
function focusPlace(p){ if(p._pos){map.setLevel(4);map.panTo(p._pos);} openDetail(p); }
function openDetail(p){
  document.getElementById('dname').textContent=p.name;
  document.getElementById('daddr').textContent=p.address||'';
  document.getElementById('dbadge').innerHTML='<span class="badge" style="background:'+(GCOLOR[p.grade]||'#888')+'">'+p.grade+'</span>';
  document.getElementById('dreason').textContent=p.reason||'';
  const img=document.getElementById('dimg');
  if(p.image){img.src=p.image;img.style.display='block';} else img.style.display='none';
  document.getElementById('detail').classList.add('open');
  highlight(p); syncRow(p);
}
function closeDetail(){document.getElementById('detail').classList.remove('open');}
</script>
</body>
</html>
